name: Build & Release

on:
  workflow_dispatch:
    inputs:
      make_release:
        description: 'Create Github Release?'
        type: boolean
        required: true
        default: false
      version:
        description: "Release version tag (e.g. v1.0.0)"
        required: false
        default: "v1.0.0"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install pyinstaller
        run: pip install "pyinstaller==6.13.0"

      - name: Build EXE with PyInstaller
        run: pyinstaller packaging/windows.spec --noconfirm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TgWsProxy
          path: |
            dist/TgWsProxy.exe

  build-win7:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.8 (last version supporting Win7)
        uses: actions/setup-python@v5
        with:
          python-version: "3.8"
          cache: "pip"

      - name: Install dependencies (Win7-compatible)
        run: pip install -r requirements-win7.txt

      - name: Install pyinstaller
        run: pip install "pyinstaller==5.13.2"

      - name: Build EXE with PyInstaller (Win7)
        run: pyinstaller packaging/windows.spec --noconfirm

      - name: Rename artifact
        run: mv dist/TgWsProxy.exe dist/TgWsProxy-win7.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TgWsProxy-win7
          path: dist/TgWsProxy-win7.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install universal2 Python
        run: |
          set -euo pipefail
          curl -LO https://www.python.org/ftp/python/3.12.10/python-3.12.10-macos11.pkg
          sudo installer -pkg python-3.12.10-macos11.pkg -target /
          echo "/Library/Frameworks/Python.framework/Versions/3.12/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: |
          set -euo pipefail
          python3.12 -m pip install --upgrade pip setuptools wheel
          python3.12 -m pip install delocate==0.13.0

          mkdir -p wheelhouse/arm64 wheelhouse/x86_64 wheelhouse/universal2

          python3.12 -m pip download \
            --only-binary=:all: \
            --platform macosx_11_0_arm64 \
            --python-version 3.12 \
            --implementation cp \
            -d wheelhouse/arm64 \
            Pillow==12.1.0 \
            psutil==7.0.0

          python3.12 -m pip download \
            --only-binary=:all: \
            --platform macosx_10_13_x86_64 \
            --python-version 3.12 \
            --implementation cp \
            -d wheelhouse/x86_64 \
            Pillow==12.1.0

          python3.12 -m pip download \
            --only-binary=:all: \
            --platform macosx_10_9_x86_64 \
            --python-version 3.12 \
            --implementation cp \
            -d wheelhouse/x86_64 \
            psutil==7.0.0

          delocate-merge \
            wheelhouse/arm64/pillow-12.1.0-*.whl \
            wheelhouse/x86_64/pillow-12.1.0-*.whl \
            -w wheelhouse/universal2

          delocate-merge \
            wheelhouse/arm64/psutil-7.0.0-*.whl \
            wheelhouse/x86_64/psutil-7.0.0-*.whl \
            -w wheelhouse/universal2

          python3.12 -m pip install --no-deps wheelhouse/universal2/*.whl
          python3.12 -m pip install -r requirements-macos.txt
          python3.12 -m pip install pyinstaller==6.13.0

      - name: Create macOS icon from ICO
        run: |
          set -euo pipefail
          chmod +x packaging/create_icon.sh
          packaging/create_icon.sh

      - name: Build app with PyInstaller
        run: python3.12 -m PyInstaller packaging/macos.spec --noconfirm

      - name: Validate universal2 app bundle
        run: |
          set -euo pipefail
          found=0
          while IFS= read -r -d '' file; do
            if file "$file" | grep -q "Mach-O"; then
              found=1
              archs="$(lipo -archs "$file" 2>/dev/null || true)"
              case "$archs" in
                *arm64*x86_64*|*x86_64*arm64*) ;;
                *)
                  echo "Missing universal2 slices in $file: ${archs:-unknown}" >&2
                  exit 1
                  ;;
              esac
            fi
          done < <(find "dist/TG WS Proxy.app" -type f -print0)

          if [ "$found" -eq 0 ]; then
            echo "No Mach-O files found in app bundle" >&2
            exit 1
          fi

      - name: Create DMG
        run: |
          set -euo pipefail
          APP_NAME="TG WS Proxy"
          DMG_TEMP="dist/dmg_temp"

          rm -rf "$DMG_TEMP"
          mkdir -p "$DMG_TEMP"
          cp -R "dist/${APP_NAME}.app" "$DMG_TEMP/"
          ln -s /Applications "$DMG_TEMP/Applications"

          hdiutil create \
            -volname "$APP_NAME" \
            -srcfolder "$DMG_TEMP" \
            -ov \
            -format UDZO \
            "dist/TgWsProxy.dmg"

          rm -rf "$DMG_TEMP"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TgWsProxy-macOS
          path: dist/TgWsProxy.dmg

  release:
    needs: [build, build-win7, build-macos]
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.make_release == 'true' }}
    steps:
      - name: Download main build
        uses: actions/download-artifact@v4
        with:
          name: TgWsProxy
          path: dist

      - name: Download Win7 build
        uses: actions/download-artifact@v4
        with:
          name: TgWsProxy-win7
          path: dist

      - name: Download macOS build
        uses: actions/download-artifact@v4
        with:
          name: TgWsProxy-macOS
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: "TG WS Proxy ${{ github.event.inputs.version }}"
          body: |
            ## TG WS Proxy ${{ github.event.inputs.version }}
          files: |
            dist/TgWsProxy.exe
            dist/TgWsProxy-win7.exe
            dist/TgWsProxy.dmg
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
